<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Flor do Sol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap">
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-gray-50 text-[#1a2e1a]">

  <nav class="bg-[#1a2e1a] text-white p-4 shadow-md">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-wide text-white">Flor do Sol <span class="text-sm font-normal text-gray-300">| Painel Geral</span></h1>
      <a href="../catalogo.html" class="text-sm bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition">Ver Loja</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-3xl text-[#1a2e1a]">Gerenciamento do Jardim</h2>
        <p class="text-gray-500 text-sm mt-1">Adicione, edite ou remova produtos do catálogo em tempo real.</p>
      </div>
      <button onclick="abrirModalCadastro()" class="bg-[#1a2e1a] text-white px-5 py-3 rounded-full font-medium hover:opacity-90 transition shadow-sm flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Novo Produto
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-xs font-semibold text-gray-500 uppercase border-b border-gray-100">
              <th class="p-4">Imagem</th>
              <th class="p-4">Produto</th>
              <th class="p-4">Categoria</th>
              <th class="p-4">Preço</th>
              <th class="p-4">Badge</th>
              <th class="p-4 text-right">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos" class="divide-y divide-gray-100 text-sm">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modal-form" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="fecharModalForm()"></div>
    <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl relative z-10 max-h-[90vh] overflow-y-auto p-6">
      <h3 id="modal-titulo" class="text-2xl font-bold text-[#1a2e1a] mb-6">Cadastrar Produto</h3>
      
      <form id="produto-form" onsubmit="salvarProduto(event)" class="space-y-4">
        <input type="hidden" id="prod-id">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Nome do Produto *</label>
            <input type="text" id="prod-nome" required class="w-full border rounded-xl px-4 py-2.5 outline-none focus:border-[#1a2e1a]">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Preço (R$) *</label>
            <input type="number" step="0.01" id="prod-preco" required class="w-full border rounded-xl px-4 py-2.5 outline-none focus:border-[#1a2e1a]">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Categoria *</label>
            <select id="prod-categoria" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-[#1a2e1a]">
              <option value="plantas">Plantas</option>
              <option value="arranjos">Arranjos</option>
              <option value="servicos">Serviços</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Badge (Ex: Popular, Novidade)</label>
            <input type="text" id="prod-badge" class="w-full border rounded-xl px-4 py-2.5 outline-none focus:border-[#1a2e1a]">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Imagem do Produto *</label>
          <div class="flex flex-col gap-2">
          <input type="file" id="prod-imagem-file" accept="image/*" class="w-full border rounded-xl px-4 py-2 text-sm outline-none focus:border-[#1a2e1a]">
    
          <input type="hidden" id="prod-imagem-atual">
          <p id="nome-imagem-atual" class="text-xs text-gray-400 italic hidden"></p>
        </div>
      </div>

        <div class="border-t pt-4 mt-4">
          <p class="text-sm font-semibold text-[#1a2e1a] mb-3">Especificações & Cuidados (Opcional)</p>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Tamanho</label>
              <input type="text" id="prod-tamanho" placeholder="Ex: 30x40cm" class="w-full border rounded-xl px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Embalagem Padrão</label>
              <input type="text" id="prod-embalagem" placeholder="Ex: Vaso de Barro" class="w-full border rounded-xl px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Rega</label>
              <input type="text" id="prod-rega" placeholder="Ex: 2x por semana" class="w-full border rounded-xl px-3 py-2 text-sm">
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Exposição ao Sol</label>
              <input type="text" id="prod-sol" placeholder="Ex: Meia sombra" class="w-full border rounded-xl px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Umidade Ideal</label>
              <input type="text" id="prod-umidade" placeholder="Ex: 60%" class="w-full border rounded-xl px-3 py-2 text-sm">
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t">
          <button type="button" onclick="fecharModalForm()" class="px-5 py-2.5 rounded-full border border-gray-300 text-gray-700 hover:bg-gray-50 transition text-sm">Cancelar</button>
          <button type="submit" class="px-6 py-2.5 rounded-full bg-[#1a2e1a] text-white font-medium hover:opacity-90 transition text-sm">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
